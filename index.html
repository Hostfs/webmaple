<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MapleReact RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for chat */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
      }
      /* Pixel art rendering crispness */
      .pixel-art {
        image-rendering: pixelated;
      }
      /* Prevent text selection on mobile */
      body {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Performance Optimization */
      .will-change-transform {
        will-change: transform;
      }
      /* Animations */
      @keyframes float-item {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float-item {
        animation: float-item 2s ease-in-out infinite;
      }
      @keyframes bounce-damage {
        0% { transform: scale(0.5); opacity: 0; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-bounce-damage {
        animation: bounce-damage 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      @keyframes spin-super-fast {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-super-fast {
        animation: spin-super-fast 0.2s linear infinite;
      }
      @keyframes bounce-slow {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .animate-bounce-slow {
        animation: bounce-slow 1s ease-in-out infinite;
      }
      /* Mask for chat fade */
      .mask-fade-top {
        mask-image: linear-gradient(to bottom, transparent, black 20%);
        -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%);
      }
      .clip-spikes {
        clip-path: polygon(20% 0%, 0% 20%, 30% 50%, 0% 80%, 20% 100%, 50% 70%, 80% 100%, 100% 80%, 70% 50%, 100% 20%, 80% 0%, 50% 30%);
      }
    </style>
  <script type="importmap">
{

  }
}
</script>

</head>

</html>
